  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

45deg)}\n.mix-chip.on .mc-code{color:var(--accent)}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<!-- DIVISION SELECT -->\n<div class=\"screen active\" id=\"select\" data-screen-label=\"Select\">\n  <div class=\"wrap select-wrap\">\n    <header class=\"brand\">\n      <div class=\"eyebrow\">Architect Registration Examination<\u002Fdiv>\n      <h1 class=\"brand-title\">ARE&nbsp;<span>5.0<\u002Fspan><\u002Fh1>\n      <p class=\"brand-sub\">Adaptive practice across all six divisions.<\u002Fp>\n    <\u002Fheader>\n\n    <div class=\"overall\" id=\"overallStat\"><\u002Fdiv>\n\n    <div class=\"section-label\"><span>Choose a division<\u002Fspan><span class=\"rule\"><\u002Fspan><\u002Fdiv>\n    <div class=\"div-grid\" id=\"divGrid\"><\u002Fdiv>\n\n    <div class=\"session-bar\">\n      <div class=\"section-label\"><span>Session length<\u002Fspan><span class=\"rule\"><\u002Fspan><\u002Fdiv>\n      <div class=\"qc-group\" id=\"qcGroup\">\n        <button class=\"qc-btn selected\" onclick=\"setQC(1,this)\"><span class=\"n\">1<\u002Fspan><span class=\"u\">Question<\u002Fspan><\u002Fbutton>\n        <button class=\"qc-btn\" onclick=\"setQC(5,this)\"><span class=\"n\">5<\u002Fspan><span class=\"u\">Questions<\u002Fspan><\u002Fbutton>\n        <button class=\"qc-btn\" onclick=\"setQC(10,this)\"><span class=\"n\">10<\u002Fspan><span class=\"u\">Questions<\u002Fspan><\u002Fbutton>\n        <button class=\"qc-btn\" onclick=\"setQC(25,this)\"><span class=\"n\">25<\u002Fspan><span class=\"u\">Questions<\u002Fspan><\u002Fbutton>\n        <button class=\"qc-btn\" onclick=\"setQC(50,this)\"><span class=\"n\">50<\u002Fspan><span class=\"u\">Questions<\u002Fspan><\u002Fbutton>\n        <button class=\"qc-btn\" onclick=\"setQC(100,this)\"><span class=\"n\">100<\u002Fspan><span class=\"u\">Questions<\u002Fspan><\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"section-label\" style=\"margin-top:32px\"><span>Question bank<\u002Fspan><span class=\"rule\"><\u002Fspan><\u002Fdiv>\n    <button class=\"gen-cta\" onclick=\"openGen()\">\n      <span class=\"gen-cta-icon\">+<\u002Fspan>\n      <span class=\"gen-cta-main\"><span class=\"gen-cta-title\">Generate new questions<\u002Fspan><span class=\"gen-cta-sub\">Write 100 fresh ARE-style questions for any division<\u002Fspan><\u002Fspan>\n      <span class=\"gen-cta-arr\">→<\u002Fspan>\n    <\u002Fbutton>\n    <div class=\"bank-links\">\n      <button class=\"reset-link\" id=\"clearGenLink\" onclick=\"clearGenerated()\" hidden=\"\"><\u002Fbutton>\n      <button class=\"reset-link\" onclick=\"resetProgress()\">Reset progress<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"select-footer\">\n    <div class=\"wrap\">\n      <button class=\"btn-primary\" id=\"startBtn\" onclick=\"startSession()\" disabled=\"\">Select a division to begin<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- QUESTION -->\n<div class=\"screen\" id=\"question\" data-screen-label=\"Question\">\n  <div class=\"q-top\">\n    <div class=\"wrap q-top-inner\">\n      <button class=\"q-back\" onclick=\"confirmExit()\" aria-label=\"Exit session\">←<\u002Fbutton>\n      <span class=\"div-chip\" id=\"qBadge\">CE<\u002Fspan>\n      <div class=\"q-steps\" id=\"qSteps\"><\u002Fdiv>\n      <span class=\"q-count-lbl mono\" id=\"qProg\">01 / 10<\u002Fspan>\n      <span class=\"q-score\" id=\"qScore\"><b>0<\u002Fb>&nbsp;correct<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"q-scroll\">\n    <div class=\"wrap q-body\" id=\"qBody\"><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"q-foot\">\n    <div class=\"wrap\" id=\"qFoot\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- SCORE -->\n<div class=\"screen\" id=\"score\" data-screen-label=\"Results\">\n  <div class=\"wrap score-wrap\">\n    <div class=\"score-eyebrow\">Session complete<\u002Fdiv>\n    <div class=\"score-ring-host\" id=\"scoreRingHost\"><\u002Fdiv>\n    <div class=\"score-line\" id=\"scoreLine\"><\u002Fdiv>\n    <div class=\"score-verd\" id=\"scoreVerd\"><\u002Fdiv>\n    <div class=\"missed-wrap\" id=\"missedWrap\"><\u002Fdiv>\n    <div class=\"score-actions\">\n      <button class=\"btn-primary\" onclick=\"restartSame()\"><span>Practice this division again<\u002Fspan><\u002Fbutton>\n      <button class=\"btn-secondary\" onclick=\"goSelect()\">Choose another division<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- GENERATOR -->\n<div class=\"gen-overlay\" id=\"genOverlay\" onclick=\"if(event.target===this)closeGen()\">\n  <div class=\"gen-modal\">\n    <button class=\"gen-x\" onclick=\"closeGen()\" aria-label=\"Close\">×<\u002Fbutton>\n    <div id=\"genPick\">\n      <div class=\"gen-eyebrow\">AI question generator<\u002Fdiv>\n      <h3 class=\"gen-title\">Generate new questions<\u002Fh3>\n      <p class=\"gen-sub\">Choose a division — we’ll write up to 100 fresh, NCARB-style practice questions with full explanations and add them to your bank.<\u002Fp>\n      <div class=\"gen-grid\" id=\"genGrid\"><\u002Fdiv>\n      <p class=\"gen-note\" id=\"genNote\"><\u002Fp>\n    <\u002Fdiv>\n    <div id=\"genRun\" hidden=\"\">\n      <div class=\"gen-eyebrow\" id=\"genRunDiv\">&nbsp;<\u002Fdiv>\n      <h3 class=\"gen-title\"><span id=\"genCount\">0<\u002Fspan> <span class=\"gen-of\">/ 100<\u002Fspan><\u002Fh3>\n      <div class=\"gen-prog\"><span id=\"genProgBar\"><\u002Fspan><\u002Fdiv>\n      <p class=\"gen-status\" id=\"genStatus\">Warming up…<\u002Fp>\n      <div class=\"gen-actions\" id=\"genActions\">\n        <button class=\"btn-secondary\" onclick=\"stopGen()\">Stop &amp; keep these<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- LOADING -->\n<div id=\"loadOverlay\">\n  <div class=\"lo-inner\">\n    <div class=\"lo-title\">Architect Registration Examination<\u002Fdiv>\n    <div class=\"lo-mark\">ARE&nbsp;<span>5.0<\u002Fspan><\u002Fdiv>\n    <div class=\"lo-bar\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- MIX PICKER -->\n<div class=\"gen-overlay\" id=\"mixOverlay\" onclick=\"if(event.target===this)closeMix()\">\n  <div class=\"gen-modal\">\n    <button class=\"gen-x\" onclick=\"closeMix()\" aria-label=\"Close\">×<\u002Fbutton>\n    <div class=\"gen-eyebrow\">Custom mix<\u002Fdiv>\n    <h3 class=\"gen-title\">All Divisions<\u002Fh3>\n    <p class=\"gen-sub\">Combine whichever divisions you want into one mixed session. Related divisions make natural study pairings.<\u002Fp>\n    <div class=\"mix-presets\" id=\"mixPresets\"><\u002Fdiv>\n    <div class=\"mix-or\"><span class=\"rule\"><\u002Fspan><span>or pick your own<\u002Fspan><span class=\"rule\"><\u002Fspan><\u002Fdiv>\n    <div class=\"mix-grid\" id=\"mixGrid\"><\u002Fdiv>\n    <button class=\"btn-primary\" id=\"mixConfirm\" onclick=\"confirmMix()\"><span>Use this mix<\u002Fspan><\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\nlet QBANK=[];\nconst DIV_NAMES={\n  PcM:'Practice Management', PjM:'Project Management', PA:'Programming & Analysis',\n  PPD:'Project Planning & Design', PDD:'Project Development & Documentation', CE:'Construction & Evaluation'\n};\nconst DIV_ORDER=['PcM','PjM','PA','PPD','PDD','CE'];\nconst DIV_DESC={\n  PcM:'business structures, HR, ethics, risk, insurance, professional conduct',\n  PjM:'contracts (B101/A201/C401), scheduling, budgets, the CA phase, RFIs, submittals',\n  PA:'site analysis, zoning, code research, programming, feasibility',\n  PPD:'structural, MEP, accessibility, life safety, building systems, schematic and design development',\n  PDD:'details, specifications, construction documents, material coordination, constructability',\n  CE:'bidding, award, construction administration, pay applications, punch lists, post-occupancy'\n};\n\nlet BASE=[], GEN=[];\nlet selDiv=null, selQC=1;\nlet selMix=[...DIV_ORDER];\nconst MIX_PRESETS=[\n  {label:'All six divisions', divs:[...DIV_ORDER]},\n  {label:'Practice & Management', note:'PcM · PjM · CE', divs:['PcM','PjM','CE']},\n  {label:'Design & Technical', note:'PA · PPD · PDD', divs:['PA','PPD','PDD']}\n];\nfunction rebuildQBANK(){ QBANK=BASE.concat(GEN); }\nlet session={div:'',qs:[],idx:0,correct:0,missed:[],results:[]};\nlet revealed=false, cataSet=new Set();\n\n/* ── Load bank ──────────────────────────────────────────────── */\nfunction loadBank(){\n  const overlay=document.getElementById('loadOverlay');\n  try{\n    const data=window.ARE_QUESTIONS;\n    if(!data) throw new Error('are_questions.js not loaded');\n    BASE=Array.isArray(data)?data:(data.questions||[]);\n    if(!BASE.length) throw new Error('Question bank is empty');\n    GEN=getGenerated(); rebuildQBANK();\n    buildGrid(); renderOverall(); refreshClearLink();\n    setTimeout(()=>{overlay.style.opacity='0'; overlay.style.transition='opacity .4s'; setTimeout(()=>overlay.style.display='none',420);},220);\n  }catch(e){\n    overlay.innerHTML=`<div class=\"err-box\">\n      <div style=\"font-size:1.8rem\">&#9888;<\u002Fdiv>\n      <div class=\"ec\">Could not load questions<\u002Fdiv>\n      <div class=\"ed\">Make sure <code>are_questions.js<\u002Fcode> sits in the same folder as this file.<br><br>${e.message}<\u002Fdiv>\n      <button class=\"btn-primary\" style=\"margin-top:22px\" onclick=\"loadBank()\">Retry<\u002Fbutton>\n    <\u002Fdiv>`;\n  }\n}\nwindow.addEventListener('load',loadBank);\n\n/* ── Mastery ring SVG ───────────────────────────────────────── */\nfunction ringSVG(pct,variant,animate){\n  const cfg=variant==='lg'?{s:184,st:11}:{s:42,st:4};\n  const r=(cfg.s-cfg.st)/2, c=cfg.s/2, circ=2*Math.PI*r;\n  const off=pct==null?circ:circ*(1-pct/100);\n  const ringColor=pct!=null&&pct>=(variant==='lg'?75:80)?'var(--correct)':'var(--accent)';\n  const cls='ring-prog'+(animate?' ring-anim':'');\n  const style=`--ring:${ringColor};--circ:${circ}px;stroke-dashoffset:${off}px`;\n  const prog=pct==null?'':`<circle cx=\"${c}\" cy=\"${c}\" r=\"${r}\" fill=\"none\" stroke-width=\"${cfg.st}\" stroke-linecap=\"round\" class=\"${cls}\" stroke-dasharray=\"${circ}\" style=\"${style}\" transform=\"rotate(-90 ${c} ${c})\"/>`;\n  let label='';\n  if(variant!=='lg'){\n    label=pct==null\n      ? `<text x=\"${c}\" y=\"${c}\" text-anchor=\"middle\" dominant-baseline=\"central\" class=\"ring-dash\">&ndash;<\u002Ftext>`\n      : `<text x=\"${c}\" y=\"${c}\" text-anchor=\"middle\" dominant-baseline=\"central\" class=\"ring-pct\">${pct}<\u002Ftext>`;\n  }\n  return `<svg class=\"ring ring-${variant}\" width=\"${cfg.s}\" height=\"${cfg.s}\" viewBox=\"0 0 ${cfg.s} ${cfg.s}\" aria-hidden=\"true\">\n    <circle class=\"ring-track\" cx=\"${c}\" cy=\"${c}\" r=\"${r}\" fill=\"none\" stroke-width=\"${cfg.st}\"/>${prog}${label}<\u002Fsvg>`;\n}\n\n/* ── Build select grid ──────────────────────────────────────── */\nfunction buildGrid(){\n  const stats=getStats();\n  let html='';\n  DIV_ORDER.forEach(d=>{\n    const s=stats[d], answered=s?s.answered:0;\n    const avail=QBANK.filter(q=>q.division===d).length;\n    const pct=answered>0?Math.round(s.correct/answered*100):null;\n    const meta=answered>0?`${avail} questions &middot; ${pct}% mastery`:`${avail} questions`;\n    html+=`<button class=\"div-card\" data-div=\"${d}\" onclick=\"pickDiv('${d}')\">\n      <div class=\"dc-top\"><span class=\"dc-code\">${d}<\u002Fspan>${ringSVG(pct,'sm')}<\u002Fdiv>\n      <div class=\"dc-name\">${DIV_NAMES[d]}<\u002Fdiv>\n      <div class=\"dc-meta\">${meta}<\u002Fdiv>\n    <\u002Fbutton>`;\n  });\n  html+=`<button class=\"div-card all-card\" data-div=\"ALL\" onclick=\"openMix()\">\n    <span class=\"dc-code\">All Divisions<\u002Fspan>\n    <span class=\"dc-name\" id=\"allCardName\">A mixed set drawn from every division<\u002Fspan>\n    <span class=\"dc-meta\" id=\"allCardMeta\">${QBANK.length} questions<\u002Fspan>\n  <\u002Fbutton>`;\n  document.getElementById('divGrid').innerHTML=html;\n  updateAllCard();\n}\n\nfunction renderOverall(){\n  const s=getStats(); let ta=0,tc=0;\n  DIV_ORDER.forEach(d=>{ if(s[d]){ta+=s[d].answered; tc+=s[d].correct;} });\n  const host=document.getElementById('overallStat');\n  if(ta===0){\n    host.innerHTML=`<div class=\"ov-empty\">Begin anywhere. As you practice, your mastery builds &mdash; and questions from topics you miss resurface more often.<\u002Fdiv>`;\n    return;\n  }\n  const pct=Math.round(tc/ta*100);\n  host.innerHTML=`\n    <div class=\"ov-row\">\n      <div class=\"ov-fig\"><span class=\"ov-pct\">${pct}<span class=\"ov-pctsym\">%<\u002Fspan><\u002Fspan><span class=\"ov-cap\">overall mastery<\u002Fspan><\u002Fdiv>\n      <div class=\"ov-meta\">${tc}<span class=\"ov-slash\">/<\u002Fspan>${ta} correct<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"ov-bar\"><span style=\"width:${pct}%\"><\u002Fspan><\u002Fdiv>`;\n}\n\nfunction pickDiv(d){\n  selDiv=d;\n  document.querySelectorAll('.div-card').forEach(c=>c.classList.toggle('selected',c.dataset.div===d));\n  updateStartBtn();\n}\nfunction setQC(n,el){\n  selQC=n;\n  document.querySelectorAll('.qc-btn').forEach(b=>b.classList.remove('selected'));\n  if(el) el.classList.add('selected');\n  updateStartBtn();\n}\nfunction updateStartBtn(){\n  const b=document.getElementById('startBtn');\n  b.disabled=!selDiv;\n  if(!selDiv){ b.innerHTML='Select a division to begin'; return; }\n  b.innerHTML=`<span>Begin ${selQC}-question session<\u002Fspan><span class=\"arr\">&rarr;<\u002Fspan>`;\n}\n\n/* ── Custom mix picker (All Divisions) ──────────────────────── */\nlet mixDraft=new Set(DIV_ORDER);\nfunction openMix(){\n  mixDraft=new Set(selMix.length?selMix:DIV_ORDER);\n  buildMixPresets(); buildMixGrid(); updateMixConfirm();\n  document.getElementById('mixOverlay').classList.add('open');\n}\nfunction closeMix(){ document.getElementById('mixOverlay').classList.remove('open'); }\nfunction buildMixPresets(){\n  let h='';\n  MIX_PRESETS.forEach((p,i)=>{\n    h+=`<button class=\"mix-preset\" onclick=\"applyPreset(${i})\"><span class=\"pl\">${p.label}<\u002Fspan><span class=\"pn\">${p.note||p.divs.length+' divisions'}<\u002Fspan><\u002Fbutton>`;\n  });\n  document.getElementById('mixPresets').innerHTML=h;\n}\nfunction applyPreset(i){ mixDraft=new Set(MIX_PRESETS[i].divs); buildMixGrid(); updateMixConfirm(); }\nfunction buildMixGrid(){\n  let h='';\n  DIV_ORDER.forEach(d=>{\n    const cnt=QBANK.filter(q=>q.division===d).length;\n    h+=`<button class=\"mix-chip${mixDraft.has(d)?' on':''}\" data-div=\"${d}\" onclick=\"toggleMix('${d}')\"><span class=\"box\"><\u002Fspan><span class=\"mc-main\"><span class=\"mc-code\">${d}<\u002Fspan><span class=\"mc-cnt\">${cnt} questions<\u002Fspan><\u002Fspan><\u002Fbutton>`;\n  });\n  document.getElementById('mixGrid').innerHTML=h;\n}\nfunction toggleMix(d){ if(mixDraft.has(d)) mixDraft.delete(d); else mixDraft.add(d); buildMixGrid(); updateMixConfirm(); }\nfunction updateMixConfirm(){\n  const b=document.getElementById('mixConfirm'), n=mixDraft.size;\n  const total=QBANK.filter(q=>mixDraft.has(q.division)).length;\n  b.disabled=n===0;\n  b.innerHTML=n===0?'<span>Select at least one division<\u002Fspan>'\n    :(n===DIV_ORDER.length?`<span>Mix all divisions &middot; ${total} questions<\u002Fspan>`\n    :`<span>Mix ${n} division${n===1?'':'s'} &middot; ${total} questions<\u002Fspan>`);\n}\nfunction confirmMix(){\n  if(mixDraft.size===0) return;\n  selMix=DIV_ORDER.filter(d=>mixDraft.has(d));\n  selDiv=selMix.length===DIV_ORDER.length?'ALL':'MIX';\n  closeMix(); updateAllCard();\n  document.querySelectorAll('.div-card').forEach(c=>c.classList.toggle('selected',c.dataset.div==='ALL'));\n  updateStartBtn();\n}\nfunction updateAllCard(){\n  const nm=document.getElementById('allCardName'), mt=document.getElementById('allCardMeta');\n  if(!nm) return;\n  const custom=selMix.length>0&&selMix.length<DIV_ORDER.length;\n  if(custom){\n    nm.textContent='Mixing '+selMix.join(' · ');\n    mt.textContent=QBANK.filter(q=>selMix.includes(q.division)).length+' questions';\n  }else{\n    nm.textContent='A mixed set drawn from every division';\n    mt.textContent=QBANK.length+' questions';\n  }\n}\n\n/* ── Weighted question pool ─────────────────────────────────── */\nfunction buildWeightedPool(pool){\n  const ts=JSON.parse(localStorage.getItem('are_topic_stats')||'{}');\n  return pool.map(q=>{\n    const t=ts[q.topic];\n    if(!t||t.answered===0) return {q,w:1};\n    const acc=t.correct/t.answered;\n    return {q,w:acc<0.5?3:acc<0.7?2:1};\n  });\n}\nfunction weightedShuffle(weighted){\n  const expanded=[];\n  weighted.forEach(({q,w})=>{ for(let i=0;i<w;i++) expanded.push(q); });\n  for(let i=expanded.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[expanded[i],expanded[j]]=[expanded[j],expanded[i]];}\n  const seen=new Set(), result=[];\n  expanded.forEach(q=>{ if(!seen.has(q.id)){seen.add(q.id); result.push(q);} });\n  return result;\n}\n\nfunction startSession(){\n  if(!selDiv) return;\n  let raw;\n  if(selDiv==='ALL') raw=[...QBANK];\n  else if(selDiv==='MIX') raw=QBANK.filter(q=>selMix.includes(q.division));\n  else raw=QBANK.filter(q=>q.division===selDiv);\n  const ordered=weightedShuffle(buildWeightedPool(raw));\n  const qs=ordered.slice(0,Math.min(selQC,ordered.length));\n  session={div:selDiv,qs,idx:0,correct:0,missed:[],results:[]};\n  showScreen('question'); renderQ();\n}\nfunction restartSame(){ selDiv=session.div; startSession(); }\nfunction goSelect(){ buildGrid(); renderOverall(); selDiv=null; updateStartBtn(); document.querySelectorAll('.div-card').forEach(c=>c.classList.remove('selected')); showScreen('select'); }\nfunction confirmExit(){ if(confirm('Exit this session? Your progress on these questions is saved.')) goSelect(); }\n\n/* ── Render a question ──────────────────────────────────────── */\nconst pad=n=>String(n).padStart(2,'0');\nfunction renderQ(){\n  revealed=false; cataSet=new Set();\n  const q=session.qs[session.idx], total=session.qs.length;\n  const isCata=q.question_type==='cata';\n  document.getElementById('qBadge').textContent=q.division;\n  document.getElementById('qProg').textContent=`${pad(session.idx+1)} / ${pad(total)}`;\n  updateScoreChip(); renderSteps();\n  let optHtml='';\n  q.options.forEach(o=>{\n    optHtml+=`<button class=\"opt\" id=\"o_${o.id}\" onclick=\"${isCata?`toggleCata('${o.id}')`:`pickMC('${o.id}')`}\">\n      <span class=\"opt-ltr\">${o.id}<\u002Fspan>\n      <span class=\"opt-main\"><span class=\"opt-txt\">${esc(o.text)}<\u002Fspan><\u002Fspan>\n      <span class=\"opt-mark\">${isCata?'<span class=\"chk\"><\u002Fspan>':''}<\u002Fspan>\n    <\u002Fbutton>`;\n  });\n  document.getElementById('qBody').innerHTML=`\n    <div class=\"q-meta\"><span class=\"q-type\">${isCata?'Select all that apply':'Multiple choice'}<\u002Fspan><span class=\"q-topic\">${esc(q.topic)}<\u002Fspan><\u002Fdiv>\n    <h2 class=\"q-text\">${esc(q.question_text)}<\u002Fh2>\n    <div class=\"options\" id=\"optList\">${optHtml}<\u002Fdiv>`;\n  document.querySelector('.q-scroll').scrollTop=0;\n  document.getElementById('qFoot').innerHTML=isCata\n    ?`<button class=\"btn-primary\" id=\"cataBtn\" onclick=\"submitCata()\" disabled><span>Submit answer<\u002Fspan><\u002Fbutton>`\n    :`<div class=\"foot-hint\">Choose an answer to continue<\u002Fdiv>`;\n}\nfunction renderSteps(){\n  let h='';\n  for(let i=0;i<session.qs.length;i++){\n    let cls='step';\n    if(i<session.results.length) cls+=session.results[i]?' step-correct':' step-wrong';\n    else if(i===session.idx) cls+=' step-current';\n    h+=`<span class=\"${cls}\"><\u002Fspan>`;\n  }\n  document.getElementById('qSteps').innerHTML=h;\n}\nfunction updateScoreChip(){\n  document.getElementById('qScore').innerHTML=`<b>${session.correct}<\u002Fb>&nbsp;correct`;\n}\n\n/* ── Answering ──────────────────────────────────────────────── */\nfunction pickMC(id){\n  if(revealed) return; revealed=true;\n  const q=session.qs[session.idx];\n  const correct=q.options.find(o=>o.is_correct);\n  const isRight=id===correct.id;\n  if(isRight) session.correct++; else session.missed.push({topic:q.topic,text:trimQ(q.question_text)});\n  session.results[session.idx]=isRight;\n  updateStats(session.div,isRight); updateTopicStats(q.topic,isRight);\n  revealAll(q,id,null); renderSteps(); updateScoreChip(); showNextBtn();\n}\nfunction toggleCata(id){\n  if(revealed) return;\n  const el=document.getElementById('o_'+id);\n  if(cataSet.has(id)){cataSet.delete(id); el.classList.remove('sel');}\n  else{cataSet.add(id); el.classList.add('sel');}\n  const sub=document.getElementById('cataBtn'); if(sub) sub.disabled=cataSet.size===0;\n}\nfunction submitCata(){\n  if(revealed||cataSet.size===0) return; revealed=true;\n  const q=session.qs[session.idx];\n  const correctIds=new Set(q.options.filter(o=>o.is_correct).map(o=>o.id));\n  const isRight=cataSet.size===correctIds.size&&[...cataSet].every(i=>correctIds.has(i));\n  if(isRight) session.correct++; else session.missed.push({topic:q.topic,text:trimQ(q.question_text)});\n  session.results[session.idx]=isRight;\n  updateStats(session.div,isRight); updateTopicStats(q.topic,isRight);\n  revealAll(q,null,cataSet); renderSteps(); updateScoreChip(); showNextBtn();\n}\nfunction revealAll(q,selectedId,checkedSet){\n  q.options.forEach(o=>{\n    const el=document.getElementById('o_'+o.id);\n    if(!el) return;\n    el.disabled=true; el.onclick=null; el.classList.remove('sel'); el.classList.add('revealed');\n    const picked=selectedId?o.id===selectedId:checkedSet&&checkedSet.has(o.id);\n    if(picked&&o.is_correct) el.classList.add('rev-correct');\n    else if(picked&&!o.is_correct) el.classList.add('rev-wrong');\n    else if(o.is_correct) el.classList.add('rev-correct-alt');\n    else el.classList.add('rev-muted');\n    const mark=el.querySelector('.opt-mark');\n    if(mark) mark.innerHTML=o.is_correct?'<span class=\"m-correct\">&check;<\u002Fspan>':(picked?'<span class=\"m-wrong\">&times;<\u002Fspan>':'');\n    const main=el.querySelector('.opt-main');\n    if(main&&o.explanation){const ex=document.createElement('span'); ex.className='opt-exp'; ex.textContent=o.explanation; main.appendChild(ex);}\n  });\n  if(q.summary_explanation){\n    const sb=document.createElement('div'); sb.className='concept';\n    sb.innerHTML=`<div class=\"concept-lbl\">Core concept<\u002Fdiv><div class=\"concept-txt\">${esc(q.summary_explanation)}<\u002Fdiv>`;\n    document.getElementById('optList').after(sb);\n  }\n}\nfunction showNextBtn(){\n  const isLast=session.idx+1>=session.qs.length;\n  document.getElementById('qFoot').innerHTML=isLast\n    ?`<button class=\"btn-primary\" onclick=\"showScore()\"><span>See results<\u002Fspan><span class=\"arr\">&rarr;<\u002Fspan><\u002Fbutton>`\n    :`<button class=\"btn-primary\" onclick=\"nextQ()\"><span>Next question<\u002Fspan><span class=\"arr\">&rarr;<\u002Fspan><\u002Fbutton>`;\n}\nfunction nextQ(){ session.idx++; renderQ(); }\n\n/* ── Score ──────────────────────────────────────────────────── */\nfunction showScore(){\n  const c=session.correct, t=session.qs.length, pct=Math.round(c/t*100);\n  document.getElementById('scoreRingHost').innerHTML=`${ringSVG(pct,'lg',true)}\n    <div class=\"sr-center\"><div class=\"sr-pct\">${pct}<span class=\"s\">%<\u002Fspan><\u002Fdiv><div class=\"sr-sub\">score<\u002Fdiv><\u002Fdiv>`;\n  document.getElementById('scoreLine').textContent=`${c} of ${t} answered correctly`;\n  const v=document.getElementById('scoreVerd');\n  if(pct>=80){v.textContent='Exam-ready command'; v.className='score-verd pass';}\n  else if(pct>=60){v.textContent='Solid — refine the gaps'; v.className='score-verd mid';}\n  else{v.textContent='Build the fundamentals'; v.className='score-verd fail';}\n  // missed topics, grouped\n  const mw=document.getElementById('missedWrap');\n  if(session.missed.length===0){\n    mw.innerHTML=`<div class=\"perfect\">&#10003;&nbsp; Flawless session — every answer correct.<\u002Fdiv>`;\n  }else{\n    const groups={};\n    session.missed.forEach(m=>{ (groups[m.topic]=groups[m.topic]||[]).push(m.text); });\n    let items='';\n    Object.keys(groups).forEach(topic=>{\n      const arr=groups[topic];\n      items+=`<div class=\"missed-item\"><span class=\"mi-topic\">${esc(topic)}<\u002Fspan><span class=\"mi-text\">${esc(arr[0])}<\u002Fspan><span class=\"mi-count\">&times;${arr.length}<\u002Fspan><\u002Fdiv>`;\n    });\n    mw.innerHTML=`<div class=\"missed-head\"><span>Topics to review<\u002Fspan><span class=\"rule\"><\u002Fspan><\u002Fdiv>${items}`;\n  }\n  showScreen('score');\n}\n\n/* ── Stats ──────────────────────────────────────────────────── */\nfunction getStats(){try{return JSON.parse(localStorage.getItem('are_stats')||'{}');}catch(e){return {};}}\nfunction updateStats(div,correct){\n  const s=getStats();\n  // For mixed sessions, credit the question's own division\n  if(div==='ALL'||div==='MIX'){\n    const q=session.qs[session.idx]; const d=q.division;\n    if(!s[d])s[d]={answered:0,correct:0}; s[d].answered++; if(correct)s[d].correct++;\n  }else{\n    if(!s[div])s[div]={answered:0,correct:0}; s[div].answered++; if(correct)s[div].correct++;\n  }\n  localStorage.setItem('are_stats',JSON.stringify(s));\n}\nfunction updateTopicStats(topic,correct){\n  const ts=JSON.parse(localStorage.getItem('are_topic_stats')||'{}');\n  if(!ts[topic])ts[topic]={answered:0,correct:0};\n  ts[topic].answered++; if(correct)ts[topic].correct++;\n  localStorage.setItem('are_topic_stats',JSON.stringify(ts));\n}\nfunction resetProgress(){\n  if(!confirm('Reset all mastery and topic progress? This cannot be undone.')) return;\n  localStorage.removeItem('are_stats'); localStorage.removeItem('are_topic_stats');\n  buildGrid(); renderOverall();\n}\n\n/* ── AI question generation ─────────────────────────────────── */\nfunction getGenerated(){try{return JSON.parse(localStorage.getItem('are_generated')||'[]');}catch(e){return [];}}\nfunction saveGenerated(arr){try{localStorage.setItem('are_generated',JSON.stringify(arr));}catch(e){}}\nfunction refreshClearLink(){\n  const l=document.getElementById('clearGenLink'); if(!l) return;\n  if(GEN.length){ l.hidden=false; l.textContent='Clear '+GEN.length+' AI question'+(GEN.length===1?'':'s'); }\n  else l.hidden=true;\n}\nfunction clearGenerated(){\n  if(!GEN.length) return;\n  if(!confirm('Remove all '+GEN.length+' AI-generated questions? Your original bank stays intact.')) return;\n  GEN=[]; saveGenerated(GEN); rebuildQBANK(); buildGrid(); renderOverall(); refreshClearLink();\n}\n\nlet genState=null;\nfunction openGen(){\n  buildGenGrid();\n  document.getElementById('genPick').hidden=false;\n  document.getElementById('genRun').hidden=true;\n  const online=!!(window.claude&&window.claude.complete);\n  document.getElementById('genNote').innerHTML=online\n    ? 'Built in small batches &middot; takes a minute or two &middot; stop anytime and keep what&rsquo;s made'\n    : 'Note: generation needs an internet connection and won&rsquo;t run in the offline downloaded file.';\n  document.getElementById('genOverlay').classList.add('open');\n}\nfunction closeGen(){\n  if(genState&&genState.running){ if(!confirm('Stop generating and close?')) return; genState.running=false; }\n  document.getElementById('genOverlay').classList.remove('open');\n}\nfunction buildGenGrid(){\n  let h='';\n  DIV_ORDER.forEach(d=>{\n    const cnt=QBANK.filter(q=>q.division===d).length;\n    h+=`<button class=\"gen-opt\" onclick=\"startGeneration('${d}')\"><div class=\"c\">${d}<\u002Fdiv><div class=\"nm\">${DIV_NAMES[d]}<\u002Fdiv><div class=\"cnt\">${cnt} in bank<\u002Fdiv><\u002Fbutton>`;\n  });\n  h+=`<button class=\"gen-opt gen-opt-all\" style=\"grid-column:1/-1\" onclick=\"startGeneration('ALL')\"><div class=\"c\">All Divisions<\u002Fdiv><div class=\"nm\">A spread of fresh questions across every division<\u002Fdiv><div class=\"cnt\">${QBANK.length} in bank<\u002Fdiv><\u002Fbutton>`;\n  document.getElementById('genGrid').innerHTML=h;\n}\nfunction buildGenPrompt(div,recent){\n  const avoid=recent.length?` Do NOT reuse these recently-used topics: ${[...new Set(recent)].join(', ')}.`:'';\n  return `You write ARE 5.0 (Architect Registration Examination) practice questions for the ${div} division, which covers: ${DIV_DESC[div]}.\\n`+\n  `Generate exactly 3 NEW, distinct, exam-realistic questions.\\n`+\n  `Rules:\\n`+\n  `- Make about 1 in 4 a check-all-that-apply (question_type \"cata\", 4-5 options, TWO OR MORE correct); the rest are \"multiple_choice\" with 4 options A-D and EXACTLY ONE correct.\\n`+\n  `- Use realistic project scenarios or calculations with all numbers inline. No trick questions.\\n`+\n  `- Be CONCISE so all 3 fit the response: each option \"explanation\" is ONE short sentence under 18 words. Correct ones begin \"Correct:\" and cite the relevant AIA document, code section, or NCARB rule; wrong ones begin \"Wrong:\".\\n`+\n  `- Add a \"summary_explanation\" of one short sentence (under 22 words) with the core concept. Vary topics widely.${avoid}\\n`+\n  `Return ONLY a compact JSON array, no markdown or prose, of exactly this shape:\\n`+\n  `[{\"division\":\"${div}\",\"topic\":\"Short Topic\",\"question_type\":\"multiple_choice\",\"question_text\":\"...\",\"options\":[{\"id\":\"A\",\"text\":\"...\",\"is_correct\":false,\"explanation\":\"Wrong: ...\"},{\"id\":\"B\",\"text\":\"...\",\"is_correct\":true,\"explanation\":\"Correct: ...\"},{\"id\":\"C\",\"text\":\"...\",\"is_correct\":false,\"explanation\":\"Wrong: ...\"},{\"id\":\"D\",\"text\":\"...\",\"is_correct\":false,\"explanation\":\"Wrong: ...\"}],\"summary_explanation\":\"...\"}]`;\n}\nfunction normalizeQ(q,div){\n  if(!q||typeof q!=='object') return null;\n  if(typeof q.question_text!=='string'||q.question_text.trim().length<12) return null;\n  if(!Array.isArray(q.options)||q.options.length<3||q.options.length>6) return null;\n  const isCata=q.question_type==='cata';\n  let correct=0;\n  for(const o of q.options){\n    if(!o||typeof o.id!=='string'||typeof o.text!=='string'||!o.text.trim()) return null;\n    if(typeof o.explanation!=='string'||!o.explanation.trim()) return null;\n    o.is_correct=o.is_correct===true||o.is_correct==='true';\n    if(o.is_correct) correct++;\n  }\n  if(isCata){ if(correct<2) return null; }\n  else { if(correct!==1||q.options.length!==4) return null; }\n  return {\n    id:'gen_'+div.toLowerCase()+'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6),\n    division:div,\n    topic:(typeof q.topic==='string'&&q.topic.trim())?q.topic.trim().slice(0,44):'General',\n    question_type:isCata?'cata':'multiple_choice',\n    question_text:q.question_text.trim(),\n    options:q.options.map(o=>({id:String(o.id).trim().slice(0,2),text:o.text.trim(),is_correct:o.is_correct,explanation:o.explanation.trim()})),\n    summary_explanation:(typeof q.summary_explanation==='string')?q.summary_explanation.trim():''\n  };\n}\nfunction extractObjects(raw){\n  const objs=[]; let depth=0,start=-1,inStr=false,esc=false;\n  for(let i=0;i<raw.length;i++){\n    const code=raw.charCodeAt(i);\n    if(inStr){\n      if(esc){esc=false;}\n      else if(code===92){esc=true;}      /* backslash */\n      else if(code===34){inStr=false;}   /* quote */\n      continue;\n    }\n    if(code===34){inStr=true;continue;}\n    if(code===123){ if(depth===0) start=i; depth++; }                /* { */\n    else if(code===125){ if(depth>0){ depth--; if(depth===0&&start>=0){ objs.push(raw.slice(start,i+1)); start=-1; } } } /* } */\n  }\n  return objs;\n}\nfunction parseQuestions(raw,div){\n  if(!raw||typeof raw!=='string') return [];\n  const out=[];\n  extractObjects(raw).forEach(s=>{\n    let q=null; try{ q=JSON.parse(s); }catch(e){ return; }\n    const n=normalizeQ(q,div); if(n) out.push(n);\n  });\n  return out;\n}\nasync function genBatch(div,recent){\n  const raw=await window.claude.complete(buildGenPrompt(div,recent));\n  return parseQuestions(raw,div);\n}\nfunction updateGenProgress(msg){\n  const pct=Math.min(100,Math.round(genState.added/genState.target*100));\n  document.getElementById('genCount').textContent=genState.added;\n  document.getElementById('genProgBar').style.width=pct+'%';\n  if(msg) document.getElementById('genStatus').textContent=msg;\n}\nfunction stopGen(){ if(genState){ genState.running=false; document.getElementById('genStatus').textContent='Finishing the current set\\u2026'; } }\nasync function startGeneration(div){\n  if(!(window.claude&&window.claude.complete)){\n    document.getElementById('genGrid').innerHTML='<div class=\"gen-err\" style=\"grid-column:1/-1\">Live generation needs an internet connection, so it isn\\u2019t available in the offline downloaded file. Open the app online to generate questions.<\u002Fdiv>';\n    return;\n  }\n  genState={running:true,div,added:0,target:100,recent:[],fails:0,batchIx:0};\n  const isAll=div==='ALL';\n  document.getElementById('genPick').hidden=true;\n  document.getElementById('genRun').hidden=false;\n  document.getElementById('genActions').innerHTML='<button class=\"btn-secondary\" onclick=\"stopGen()\">Stop &amp; keep these<\u002Fbutton>';\n  document.getElementById('genRunDiv').textContent=isAll?'All Divisions \\u00b7 Mixed':(DIV_NAMES[div]+' \\u00b7 '+div);\n  updateGenProgress('Writing the first set\\u2026');\n  const status=['Writing realistic scenarios\\u2026','Drafting answer choices\\u2026','Checking against NCARB guidance\\u2026','Writing explanations\\u2026','Varying the topics\\u2026'];\n  let si=0;\n  while(genState.running && genState.added<genState.target && genState.fails<12){\n    const batchDiv=isAll?DIV_ORDER[genState.batchIx%DIV_ORDER.length]:div;\n    genState.batchIx++;\n    try{\n      const batch=await genBatch(batchDiv,genState.recent);\n      if(!batch.length){ genState.fails++; }\n      else{\n        batch.forEach(q=>{ if(genState.added>=genState.target) return; GEN.push(q); genState.added++; genState.recent.push(q.topic); });\n        if(genState.recent.length>18) genState.recent=genState.recent.slice(-18);\n        saveGenerated(GEN); rebuildQBANK();\n        updateGenProgress(isAll?`Adding to ${batchDiv}\\u2026`:status[si++%status.length]);\n      }\n    }catch(e){ genState.fails++; await new Promise(r=>setTimeout(r,400)); }\n  }\n  finishGen();\n}\nfunction finishGen(){\n  const added=genState?genState.added:0, div=genState?genState.div:null;\n  if(genState) genState.running=false;\n  buildGrid(); renderOverall(); refreshClearLink();\n  updateGenProgress();\n  document.getElementById('genStatus').textContent=added>0\n    ? (div==='ALL'?`Added ${added} new question${added===1?'':'s'} across all divisions.`:`Added ${added} new ${div} question${added===1?'':'s'} to your bank.`)\n    : 'Could not generate questions just now \\u2014 please try again in a moment.';\n  document.getElementById('genActions').innerHTML='<button class=\"btn-primary\" onclick=\"closeGen()\"><span>Done<\u002Fspan><\u002Fbutton>';\n}\n\n/* ── Utility ────────────────────────────────────────────────── */\nfunction showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}\nfunction esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/<\u002Fg,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;');}\nfunction trimQ(s){s=String(s||''); return s.length>72?s.slice(0,72).trim()+'\\u2026':s;}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
